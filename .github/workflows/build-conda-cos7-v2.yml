name: build-conda-cos7-v2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build conda package in cos7 container (reliable mount)
        run: |
          set -euo pipefail
          echo "workspace=$GITHUB_WORKSPACE"
          ls -la

          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work:rw" \
            --entrypoint /bin/bash \
            --user 0:0 \
            condaforge/linux-anvil-cos7-x86_64 \
            -lc '
              set -euo pipefail
              echo "=== inside container ==="
              whoami
              pwd
              echo "=== /work ==="
              ls -la /work
              test -d /work/recipe || (echo "ERROR: /work/recipe not found (mount failed)" && exit 1)

              cd /work
              echo "=== now in /work ==="
              pwd
              ls -la recipe

              # install build tooling (NO conda-verify; conflicts with pinned py312 in image)
              mamba install -y conda-build boa conda-package-handling binutils -c conda-forge

              # build package
              conda mambabuild recipe -c conda-forge --output-folder conda-out

              echo "== produced packages =="
              ls -la conda-out/linux-64
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: conda-out-linux-64
          path: conda-out/linux-64/*.conda